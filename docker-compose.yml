services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    container_name: calculadora-prazos
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env.production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calculadora.rule=Host(`calculadora.blmlawgroup.tech`)"
      - "traefik.http.routers.calculadora.entrypoints=websecure"
      - "traefik.http.routers.calculadora.tls.certresolver=letsencrypt"
      - "traefik.http.services.calculadora.loadbalancer.server.port=3000"
    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
